{extend name="common/layout" /}
{block name="title"}SSL证书订单{/block}
{block name="main"}
<style>
    .tips {
        color: #f6a838;
        padding-left: 5px;
    }

    .control-label[is-required]:before {
        content: "*";
        color: #f56c6c;
        margin-right: 4px;
    }
</style>
<div class="row" id="app">
    <div class="col-xs-12 center-block" style="float: none;">
        <div class="panel panel-default">
            <div class="panel-heading"><h3 class="panel-title"><a class="btn btn-sm btn-default pull-right"
                                                                  href="/cert/certorder"
                                                                  style="margin-top:-6px"><i
                    class="fa fa-reply fa-fw"></i> 返回</a>{if $action=='edit'}修改{else}添加{/if}SSL证书订单</h3></div>
            <div class="panel-body">
                <form class="form-horizontal" id="taskform" method="post" onsubmit="return false" role="form">
                    <div class="form-group">
                        <label class="col-sm-3 col-xs-12 control-label no-padding-right" is-required>证书账户</label>
                        <div class="col-sm-6"><select class="form-control" name="aid" required v-model="set.aid">
                            <option value="">--选择证书账户--</option>
                            {foreach $accounts as $k=>$v}
                            <option data-type="{$v.type}" value="{$k}">{$v.name}</option>
                            {/foreach}
                            <option data-type="" value="-1">手动续期</option>
                        </select></div>
                    </div>
                    <div class="form-group" v-show="set.aid==-1">
                        <label class="col-sm-3 control-label no-padding-right" is-required>证书内容</label>
                        <div class="col-sm-6">
                            <div class="input-group">
                                <textarea class="form-control" name="fullchain" placeholder="输入PEM格式证书链" required
                                          rows="5" v-model="set.fullchain"></textarea>
                                <a @click="upload('fullchain')" class="btn btn-default input-group-addon"
                                   title="上传证书文件"><i class="fa fa-upload"></i></a>
                            </div>
                        </div>
                    </div>
                    <div class="form-group" v-show="set.aid==-1">
                        <label class="col-sm-3 control-label no-padding-right" is-required>私钥内容</label>
                        <div class="col-sm-6">
                            <div class="input-group">
                                <textarea class="form-control" name="privatekey" placeholder="输入PEM格式私钥" required
                                          rows="5" v-model="set.privatekey"></textarea>
                                <a @click="upload('privatekey')" class="btn btn-default input-group-addon"
                                   title="上传私钥文件"><i class="fa fa-upload"></i></a>
                            </div>
                        </div>
                    </div>
                    <div class="form-group" v-show="set.aid!=-1">
                        <label class="col-sm-3 control-label no-padding-right" is-required>签名算法</label>
                        <div class="col-sm-6">
                            <label class="radio-inline" v-for="item in keytypeList">
                                <input :value="item" name="keytype" type="radio" v-model="set.keytype"> {{item}}
                            </label>
                        </div>
                    </div>
                    <div class="form-group" v-show="set.aid!=-1">
                        <label class="col-sm-3 control-label no-padding-right" is-required>密钥长度</label>
                        <div class="col-sm-6">
                            <label class="radio-inline" v-for="item in keysizeList">
                                <input :value="item.value" name="keysize" type="radio" v-model="set.keysize">
                                {{item.label}}
                            </label>
                        </div>
                    </div>

                    <div class="form-group" v-show="set.aid!=-1">
                        <label class="col-sm-3 control-label no-padding-right" is-required>绑定域名</label>
                        <div class="col-sm-6">
                            <textarea class="form-control" name="domains" placeholder="请输入域名，一行一个" required
                                      rows="5" v-model="domains"></textarea>
                        </div>
                    </div>

                    <div class="form-group">
                        <div class="col-sm-offset-3 col-sm-6">
                            <button @click="submit" class="btn btn-primary" type="button">提交</button>
                        </div>
                    </div>
                    <div class="panel panel-default" v-show="set.aid!=-1">
                        <div class="panel-body"><p><b style="color:#39b603;"><i class="fa fa-info-circle fa-fw"></i></b>提示：添加或修改订单信息，点击提交后，不会立即执行签发，只能通过计划任务或列表手动点击来执行
                        </p>
                            <p>证书签发之前确保该主域名下没有CAA类型记录，避免证书验证失败。</p></div>
                    </div>
                    <div class="panel panel-default" v-show="set.aid==-1">
                        <div class="panel-body"><p><b style="color:#39b603;"><i class="fa fa-info-circle fa-fw"></i></b>提示：选择手动续期，到达设置的续期天数，只会发送消息通知。
                        </p></div>
                    </div>
                </form>
            </div>
        </div>
        {/block}
        {block name="script"}
        <script src="/static/js/vue-2.7.16.min.js"></script>
        <script src="/static/js/layer/layer.js"></script>
        <script src="/static/js/bootstrapValidator.min.js"></script>
        <script>
            var action = '{$action}';
            var info = {$info | json_encode | raw
            }
            ;
            new Vue({
                el: '#app',
                data: {
                    action: '{$action}',
                    type: '',
                    domains: '',
                    set: {
                        id: '',
                        aid: '',
                        fullchain: '',
                        privatekey: '',
                        keytype: '',
                        keysize: '',
                        domains: [],
                    },
                    keytypeList: [
                        'RSA',
                        'ECC'
                    ],
                    keysizeMap: [
                        {label: '2048 bit', value: '2048', type: 'RSA'},
                        {label: '3072 bit', value: '3072', type: 'RSA'},
                        {label: 'P-256', value: '256', type: 'ECC'},
                        {label: 'P-384', value: '384', type: 'ECC'},
                    ],
                    keysizeList: [],
                },
                watch: {
                    'set.aid': function (val) {
                        this.type = $('option:selected', 'select[name=aid]').data('type');
                    },
                    'set.keytype': function (val) {
                        this.keysizeList = this.keysizeMap.filter((item) => {
                            return item.type == val;
                        })
                        if (!this.keysizeList.filter((item) => {
                            return item.value == this.set.keysize
                        }).length)
                            this.set.keysize = this.keysizeList[0].value;
                    },
                    domains: function (val) {
                        this.set.domains = val.split("\n").filter((item) => {
                            return item.trim() != '';
                        });
                    }
                },
                mounted() {
                    if (this.action == 'edit') {
                        Object.keys(info).forEach((key) => {
                            this.$set(this.set, key, info[key])
                        })
                        this.domains = info.domains.join("\n");
                    } else {
                        this.set.keytype = 'RSA';
                    }
                    $("#taskform").bootstrapValidator({
                        live: 'submitted',
                    });
                    $('[data-toggle="tooltip"]').tooltip();
                },
                methods: {
                    submit() {
                        var that = this;
                        $("#taskform").data("bootstrapValidator").validate();
                        if (!$("#taskform").data("bootstrapValidator").isValid()) {
                            return false;
                        }
                        var ii = layer.load(2, {shade: [0.1, '#fff']});
                        $.ajax({
                            type: "POST",
                            url: "",
                            data: this.set,
                            dataType: 'json',
                            success: function (data) {
                                layer.close(ii);
                                if (data.code == 0) {
                                    layer.alert(data.msg, {icon: 1}, function () {
                                        if (document.referrer.indexOf('/cert/certorder?') > 0)
                                            window.location.href = document.referrer;
                                        else
                                            window.location.href = '/cert/certorder';
                                    });
                                } else {
                                    layer.alert(data.msg, {icon: 2});
                                }
                            },
                            error: function (data) {
                                layer.close(ii);
                                layer.msg('服务器错误');
                            }
                        });
                    },
                    upload(name) {
                        //读取上传文件并填充到表单
                        var file = document.createElement('input');
                        file.type = 'file';
                        file.accept = '.pem,.crt,.key';
                        file.style.display = 'none';
                        file.onchange = function () {
                            var reader = new FileReader();
                            reader.onload = function (e) {
                                this.set[name] = e.target.result;
                            }.bind(this);
                            reader.readAsText(file.files[0]);
                        }.bind(this);
                        document.body.appendChild(file);
                        file.click();
                    }
                },
            });
        </script>
        {/block}
