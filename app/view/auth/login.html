<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="utf-8"/>
    <meta content="webkit" name="renderer">
    <meta content="width=device-width, initial-scale=1, maximum-scale=1, shrink-to-fit=no" name="viewport">
    <meta content="IE=edge" http-equiv="X-UA-Compatible"/>
    <title>聚合DNS管理系统 - 登录</title>
    <link href="/static/css/bootstrap-3.4.1.min.css" rel="stylesheet"/>
    <link href="/static/css/font-awesome-4.7.0.min.css" rel="stylesheet"/>
    <link href="/static/css/app.min.css" rel="stylesheet">
    <link href="/static/css/skins/{$skin}.css" rel="stylesheet">
    <link href="/static/css/bootstrap-table.css" rel="stylesheet"/>
    <script src="/static/js/jquery-3.7.1.min.js"></script>
    <!--[if lt IE 9]>
    <script src="/static/js/html5shiv-3.7.3.min.js"></script>
    <script src="/static/js/respond-1.4.2.min.js"></script>
    <![endif]-->
    <style type="text/css">
        body {
            color: #999;
            background-color: #f1f4fd;
            background-size: cover
        }

        a {
            color: #444
        }

        .login-screen {
            max-width: 430px;
            padding: 0;
            margin: 100px auto 0 auto
        }

        .login-screen .well {
            border-radius: 3px;
            -webkit-box-shadow: 0 0 30px rgba(0, 0, 0, .1);
            box-shadow: 0 0 30px rgba(0, 0, 0, .1);
            background: #fff;
            border: none;
            padding: 0
        }

        @media (max-width: 767px) {
            .login-screen {
                padding: 20px 0
            }
        }

        .profile-img-card {
            width: 100px;
            height: 100px;
            display: block;
            -moz-border-radius: 50%;
            -webkit-border-radius: 50%;
            border-radius: 50%;
            margin: -93px auto 30px;
            border: 5px solid #fff
        }

        .profile-name-card {
            text-align: center
        }

        .login-head {
            background: #899fe1;
            border-radius: 3px 3px 0 0
        }

        .login-form {
            padding: 40px 30px;
            position: relative;
            z-index: 99
        }

        #login-form {
            margin-top: 20px
        }

        #login-form .input-group {
            margin-bottom: 15px
        }

        #login-form .form-control {
            font-size: 14px
        }

        #totp-form {
            margin-top: 20px
        }

        #totp-form .input-group {
            margin-bottom: 15px
        }

        #totp-form .form-control {
            font-size: 14px
        }
    </style>
</head>
<body>
<div class="container">
    <div class="login-wrapper">
        <div class="login-screen">
            <div class="well">
                <div class="login-head">
                    <img src="/static/images/login-head.png" style="width:100%;"/>
                </div>
                <div class="login-form">
                    <img class="profile-img-card" id="profile-img" src="/static/images/user.png"/>
                    <p class="profile-name-card" id="profile-name"></p>
                    <form action="" id="login-form" onsubmit="return doLogin()">
                        <div class="input-group">
                            <div class="input-group-addon"><span aria-hidden="true"
                                                                 class="glyphicon glyphicon-user"></span></div>
                            <input class="form-control" name="username" placeholder="用户名" required="required"
                                   type="text"/>
                        </div>
                        <div class="input-group">
                            <div class="input-group-addon"><span aria-hidden="true"
                                                                 class="glyphicon glyphicon-lock"></span></div>
                            <input class="form-control" name="password" placeholder="密码" required="required"
                                   type="password"/>
                        </div>
                        {if config_get('vcode', '1')=='1'}
                        <div class="input-group">
                            <div class="input-group-addon"><span aria-hidden="true"
                                                                 class="glyphicon glyphicon-lock"></span></div>
                            <input autocomplete="off" class="form-control input-lg" name="code" placeholder="验证码"
                                   required="required" type="text"/>
                            <span class="input-group-addon" style="padding: 0">
                              <img height="45" id="verifycode" onclick="this.src='/verifycode?r='+Math.random();"
                                   src="/verifycode" title="点击更换验证码">
                            </span>
                        </div>
                        {/if}
                        <div class="form-group">
                            <button class="btn btn-success btn-lg btn-block" id="submit" style="background:#708eea;"
                                    type="submit">登 录
                            </button>
                        </div>
                        <div class="pull-right"><a href="javascript:findpwd()">忘记密码</a></div>
                    </form>
                    <form action="" id="totp-form" onsubmit="return doTotp()" style="display:none;">
                        <div class="alert alert-info" role="alert">TOTP二次验证</div>
                        <div class="input-group">
                            <div class="input-group-addon"><span aria-hidden="true"
                                                                 class="glyphicon glyphicon-lock"></span></div>
                            <input autocomplete="off" class="form-control input-lg" id="totp_code"
                                   name="totp_code" placeholder="输入动态口令" required="required" type="number"/>
                        </div>
                        <div class="form-group">
                            <button class="btn btn-success btn-lg btn-block" id="submit" style="background:#708eea;"
                                    type="submit">登 录
                            </button>
                        </div>
                        <div class="pull-right"><a href="javascript:findpwd()">忘记密码</a></div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<div class="modal" id="modal-findpwd">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <button aria-label="Close" class="close" data-dismiss="modal" type="button">
                    <span aria-hidden="true">&times;</span>
                </button>
                <h4 class="modal-title">忘记密码</h4>
            </div>
            <div class="modal-body">
                <strong>重置密码</strong>
                <p>进入网站根目录，执行命令：<br/><code>php think reset pwd 用户名 密码</code></p>
                <strong>关闭TOTP</strong>
                <p>进入网站根目录，执行命令：<br/><code>php think reset totp 用户名</code></p>
            </div>
        </div>
    </div>
</div>
<script src="/static/js/bootstrap-3.4.1.min.js"></script>
<script src="/static/js/layer/layer.js"></script>
<script>
    function doLogin() {
        var username = $("input[name='username']").val();
        var password = $("input[name='password']").val();
        var code = $("input[name='code']").val();
        if (username == '') {
            layer.msg('用户名不能为空', {icon: 2});
            return false;
        }
        if (password == '') {
            layer.msg('密码不能为空', {icon: 2});
            return false;
        }
        if (code == '') {
            layer.msg('验证码不能为空', {icon: 2});
            return false;
        }
        var ii = layer.load(2);
        $.ajax({
            type: "POST",
            url: "/login",
            data: $("#login-form").serialize(),
            dataType: 'json',
            success: function (data) {
                layer.close(ii);
                if (data.code == 0) {
                    layer.msg('登录成功，正在跳转到首页', {icon: 1, shade: 0.01, time: 15000});
                    window.location.href = '/';
                } else {
                    if (data.vcode == 1) {
                        $("#verifycode").attr('src', '/verifycode?r=' + Math.random())
                    } else if (data.vcode == 2) {
                        $("#totp-form").show();
                        $("#login-form").hide();
                        $("#totp_code").focus();
                        return false;
                    }
                    layer.alert(data.msg, {icon: 2});
                }
            }
        });
        return false;
    }

    function doTotp() {
        var code = $("#totp_code").val();
        if (code.length != 6) {
            layer.msg('动态口令格式错误', {icon: 2});
            return false;
        }
        var ii = layer.load(2, {shade: [0.1, '#fff']});
        $.post('/auth/totp', {code: code}, function (res) {
            layer.close(ii);
            if (res.code == 0) {
                layer.msg('登录成功，正在跳转到首页', {icon: 1, shade: 0.01, time: 15000});
                window.location.href = '/';
            } else {
                layer.alert(res.msg, {icon: 2});
            }
        });
        return false;
    }

    function findpwd() {
        $('#modal-findpwd').modal('show');
    }

    $(document).ready(function () {
        $("#totp_code").keyup(function () {
            var code = $(this).val();
            if (code.length == 6) {
                $("#totp-form").submit();
            }
        });
    });
</script>
</body>
</html>
