{extend name="common/layout" /}
{block name="title"}域名账户{/block}
{block name="main"}
<style>
    .tips {
        color: #f6a838;
        padding-left: 5px;
    }

    .input-note {
        color: green;
    }

    .control-label[is-required]:before {
        content: "*";
        color: #f56c6c;
        margin-right: 4px;
    }
</style>
<div class="row" id="app">
    <div class="col-xs-12 center-block" style="float: none;">
        <div class="panel panel-default">
            <div class="panel-heading"><h3 class="panel-title"><a class="btn btn-sm btn-default pull-right"
                                                                  href="javascript:window.history.back()"
                                                                  style="margin-top:-6px"><i
                    class="fa fa-reply fa-fw"></i> 返回</a>{if $action=='edit'}编辑{else}添加{/if}域名账户</h3></div>
            <div class="panel-body">
                <form class="form-horizontal" id="accountform" method="post" onsubmit="return false" role="form">
                    <div class="form-group">
                        <label class="col-sm-3 control-label no-padding-right" is-required>账户类型</label>
                        <div class="col-sm-6">
                            <select class="form-control" name="type" v-model="set.type">
                                <option :data-icon="item.icon" :value="key" v-for="(item, key) in typeList">
                                    {{item.name}}
                                </option>
                            </select>
                        </div>
                    </div>
                    <div v-for="(item,name) in inputs" v-show="isShow(item.show)">
                        <div class="form-group" v-if="item.type=='input'">
                            <label :is-required="item.required" class="col-sm-3 control-label no-padding-right">{{item.name}}</label>
                            <div class="col-sm-6">
                                <input :data-bv-digits="item.validator=='digits'"
                                       :data-bv-email="item.validator=='email'" :data-bv-id="item.validator=='id'"
                                       :data-bv-integer="item.validator=='integer'"
                                       :data-bv-numeric="item.validator=='numeric'"
                                       :data-bv-phone="item.validator=='phone'"
                                       :data-bv-uri="item.validator=='uri'" :disabled="item.disabled"
                                       :max="item.max"
                                       :min="item.min"
                                       :name="name"
                                       :placeholder="item.placeholder"
                                       :required="item.required" class="form-control"
                                       type="text" v-model="config[name]"><span class="input-note" v-html="item.note"
                                                                                v-if="item.note"></span>
                            </div>
                        </div>
                        <div class="form-group" v-if="item.type=='textarea'">
                            <label :is-required="item.required" class="col-sm-3 control-label no-padding-right">{{item.name}}</label>
                            <div class="col-sm-6">
                                <textarea :disabled="item.disabled" :name="name" :placeholder="item.placeholder"
                                          :required="item.required" class="form-control"
                                          v-model="config[name]"></textarea><span class="input-note" v-html="item.note"
                                                                                  v-if="item.note"></span>
                            </div>
                        </div>
                        <div class="form-group" v-if="item.type=='select'">
                            <label :is-required="item.required" class="col-sm-3 control-label no-padding-right">{{item.name}}</label>
                            <div class="col-sm-6">
                                <select :disabled="item.disabled" :name="name" :placeholder="item.placeholder"
                                        :required="item.required" class="form-control"
                                        v-model="config[name]">
                                    <option :value="option.value" v-for="option in item.options">{{option.label}}
                                    </option>
                                </select><span class="input-note" v-html="item.note" v-if="item.note"></span>
                            </div>
                        </div>
                        <div class="form-group" v-if="item.type=='radio'">
                            <label :is-required="item.required" class="col-sm-3 control-label no-padding-right">{{item.name}}</label>
                            <div class="col-sm-6">
                                <label class="radio-inline" v-for="(optionname, optionvalue) in item.options">
                                    <input :disabled="item.disabled" :name="name" :value="optionvalue" type="radio"
                                           v-model="config[name]"> {{optionname}}
                                </label><br/><span class="input-note" v-html="item.note" v-if="item.note"></span>
                            </div>
                        </div>
                        <div class="form-group" v-if="item.type=='checkbox'">
                            <div class="col-sm-offset-3 col-sm-7">
                                <div class="checkbox">
                                    <label>
                                        <input :disabled="item.disabled" :name="name" type="checkbox"
                                               v-model="config[name]"> {{item.name}}
                                    </label>
                                </div>
                            </div>
                        </div>
                        <div class="form-group" v-if="item.type=='checkboxes'">
                            <label :is-required="item.required" class="col-sm-3 control-label no-padding-right">{{item.name}}</label>
                            <div class="col-sm-6">
                                <label class="checkbox-inline" v-for="(optionname, optionvalue) in item.options">
                                    <input :disabled="item.disabled" :name="name" :value="optionvalue" type="checkbox"
                                           v-model="config[name]"> {{optionname}}
                                </label><br/><span class="input-note" v-html="item.note" v-if="item.note"></span>
                            </div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="col-sm-3 control-label no-padding-right">备注</label>
                        <div class="col-sm-6">
                            <input class="form-control" name="remark" placeholder="可留空" type="text"
                                   v-model="set.remark">
                        </div>
                    </div>
                    <div class="form-group" v-show="note">
                        <div class="col-sm-offset-3 col-sm-6">
                            <div class="alert alert-dismissible alert-info">
                                <button aria-label="Close" class="close" data-dismiss="alert" type="button"><span
                                        aria-hidden="true">&times;</span></button>
                                <strong>提示：</strong><span v-html="note"></span>
                            </div>
                        </div>
                    </div>
                    <div class="form-group">
                        <div class="col-sm-offset-3 col-sm-6">
                            <button @click="submit" class="btn btn-primary" type="button">提交</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
        {/block}
        {block name="script"}
        <script src="/static/js/vue-2.7.16.min.js"></script>
        <script src="/static/js/layer/layer.js"></script>
        <script src="/static/js/select2-4.0.13.min.js"></script>
        <script src="/static/js/select2-i18n-zh-CN-4.0.13.min.js"></script>
        <script src="/static/js/bootstrapValidator.min.js"></script>
        <script>
            var info = {$info | json_encode | raw
            }

            var typeList = {$typeList | json_encode | raw
            }

            new Vue({
                el: '#app',
                data: {
                    action: '{$action}',
                    set: {
                        id: '',
                        type: '',
                        name: '',
                        config: '',
                        remark: '',
                    },
                    inputs: {},
                    config: {},
                    typeList: typeList,
                    note: '',
                },
                watch: {
                    'set.type': function (val) {
                        if (this.action == 'add' && val && typeList[val]) {
                            this.inputs = typeList[val].config;
                            this.note = typeList[val].note;
                            this.config = {};
                            $.each(this.inputs, (name, item) => {
                                if (typeof item.value == 'undefined') {
                                    if (item.type == 'checkbox') {
                                        item.value = false;
                                    } else if (item.type == 'checkboxes') {
                                        item.value = [];
                                    } else {
                                        item.value = null;
                                    }
                                }
                                this.$set(this.config, name, item.value)
                            })
                        }
                    }
                },
                mounted() {
                    if (this.action == 'edit') {
                        Object.keys(info).forEach((key) => {
                            this.set[key] = info[key]
                        })
                        var config = JSON.parse(info.config);
                        this.inputs = typeList[this.set.type].config;
                        this.note = typeList[this.set.type].note;
                        $.each(this.inputs, (name, item) => {
                            if (typeof config[name] != 'undefined') {
                                item.value = config[name];
                            }
                            if (typeof item.value == 'undefined') {
                                if (item.type == 'checkbox') {
                                    item.value = false;
                                } else if (item.type == 'checkboxes') {
                                    item.value = [];
                                } else {
                                    item.value = null;
                                }
                            }
                            this.$set(this.config, name, item.value)
                        })
                    } else {
                        this.set.type = Object.keys(typeList)[0]
                    }

                    var that = this;
                    this.$nextTick(function () {
                        $('[data-toggle="tooltip"]').tooltip();

                        function formatType(option) {
                            if (!option.id) return option.text;
                            var icon = $(option.element).data('icon');
                            if (icon) {
                                return $('<span><img src="/static/images/' + icon + '" class="type-logo" />' + option.text + '</span>');
                            }
                            return option.text;
                        }

                        $('select[name=type]').select2({
                            templateResult: formatType,
                            templateSelection: formatType,
                            minimumResultsForSearch: Infinity,
                            width: '100%'
                        }).on('select2:select', function (e) {
                            that.set.type = e.params.data.id;
                        });
                        if (that.action == 'edit') {
                            $('select[name=type]').val(that.set.type).trigger('change.select2');
                        }
                    })
                },
                methods: {
                    submit() {
                        var that = this;
                        Object.keys(this.config).forEach((key) => {
                            if (this.config[key] && typeof this.config[key] == 'string') {
                                this.config[key] = this.trim(this.config[key]);
                            }
                        })
                        this.set.config = JSON.stringify(this.config);
                        this.set.name = this.config[Object.keys(this.config)[0]];
                        let loading = layer.msg('正在进行账户有效性检查', {icon: 16, shade: 0.1, time: 0});
                        $.ajax({
                            type: "POST",
                            url: "",
                            data: this.set,
                            dataType: 'json',
                            success: function (data) {
                                layer.close(loading);
                                if (data.code == 0) {
                                    layer.alert(data.msg, {icon: 1}, function () {
                                        window.location.href = '/account';
                                    });
                                } else {
                                    layer.alert(data.msg, {icon: 2});
                                }
                            },
                            error: function (data) {
                                layer.close(loading);
                                layer.msg('服务器错误');
                            }
                        });
                    },
                    isShow(show) {
                        if (typeof show == 'boolean' && show) {
                            return show;
                        } else if (typeof show == 'string' && show) {
                            var that = this;
                            Object.keys(this.config).forEach((key) => {
                                show = show.replace(new RegExp(key, 'g'), 'that.config["' + key + '"]')
                            })
                            return eval(show);
                        } else {
                            return true;
                        }
                    },
                    trim(str) {
                        return str.replace(/(^\s*)|(\s*$)/g, "");
                    }
                },
            });
        </script>
        {/block}
